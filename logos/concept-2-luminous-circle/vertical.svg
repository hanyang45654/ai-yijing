<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <title>圆明 — Vertical Lockup (Icon above Wordmark)</title>
  <!-- Icon: Luminous Circle -->
  <g transform="translate(0, 0)">
    <circle cx="100" cy="90" r="62"
            fill="none" stroke="#1a1a2e" stroke-width="10"
            stroke-dasharray="348 42"
            stroke-dashoffset="40"
            stroke-linecap="round" />
    <circle cx="152" cy="46" r="5.5" fill="#1a1a2e" />
  </g>
  <!-- Wordmark below icon -->
  <g fill="#1a1a2e" text-anchor="middle">
    <text x="100" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="28" font-weight="700" letter-spacing="3">
      AI
    </text>
    <text x="100" y="232" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="24" font-weight="400" letter-spacing="6">
      易经
    </text>
  </g>
</svg>
