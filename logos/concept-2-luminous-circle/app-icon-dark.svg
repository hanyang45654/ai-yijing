<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>圆明 — App Icon Mockup (iOS Rounded Rectangle)</title>
  <defs>
    <clipPath id="ios-mask">
      <rect x="0" y="0" width="200" height="200" rx="42" />
    </clipPath>
  </defs>
  <!-- iOS app icon background -->
  <g clip-path="url(#ios-mask)">
    <rect x="0" y="0" width="200" height="200" fill="#1a1a2e" />
    <!-- Luminous Circle — white on dark -->
    <circle cx="100" cy="100" r="68"
            fill="none" stroke="#ffffff" stroke-width="11"
            stroke-dasharray="382 46"
            stroke-dashoffset="44"
            stroke-linecap="round" />
    <!-- Gleam — the AI spark -->
    <circle cx="157" cy="53" r="6" fill="#ffffff" />
    <!-- Subtle inner glow hint -->
    <circle cx="100" cy="100" r="68"
            fill="none" stroke="#ffffff" stroke-width="1"
            opacity="0.2"
            stroke-dasharray="382 46"
            stroke-dashoffset="44" />
  </g>
  <!-- iOS border hint -->
  <rect x="0" y="0" width="200" height="200" rx="42"
        fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15" />
</svg>
